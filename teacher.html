<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <title>LiteClass – Teacher Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="style.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<body>
  <h1>LiteClass – Teacher Tool</h1>
  <p>Create a <b>lesson.zip</b> with audio, slides, and timestamps.</p>

  <h3>1) Select Audio</h3>
  <input id="audioFile" type="file" accept="audio/*" />

  <h3>2) Select Slides</h3>
  <input id="slideFiles" type="file" accept="image/*" multiple />

  <h3>3) Slide Times (seconds, comma-separated)</h3>
  <input id="times" type="text" placeholder="0, 35, 78" style="width:90%;max-width:420px;" />

  <div style="margin-top:14px;">
    <button id="previewBtn">Preview Compression</button>
    <button id="zipBtn">Generate ZIP</button>
  </div>

  <p id="status" style="margin-top:14px;"></p>

  <script>
    function compressImage(file, quality=0.7, maxW=1280) {
      return new Promise((resolve, reject) => {
        const r = new FileReader(), img = new Image();
        r.onload = e => img.src = e.target.result;
        img.onload = () => {
          const ratio = Math.min(maxW / img.width, 1);
          const c = document.createElement('canvas');
          c.width = img.width * ratio; c.height = img.height * ratio;
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          c.toBlob(b => resolve(b), 'image/webp', quality);
        };
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }
    function bytesKB(b){ return (b/1024).toFixed(1)+' KB'; }

    previewBtn.onclick = async () => {
      const slides = [...slideFiles.files];
      if (!slides.length) return alert('Add slides');
      const first = slides[0], comp = await compressImage(first);
      status.innerText = `Slide1: ${bytesKB(first.size)} → ${bytesKB(comp.size)}`;
    };

    zipBtn.onclick = async () => {
      const audioFile = audioFileInput.files[0] || audioFile.files[0];
      const slides = [...slideFiles.files];
      const times = timesInput.value.trim().split(',').map(t=>+t.trim()).filter(n=>!isNaN(n));
      if (!audioFile || !slides.length || times.length!==slides.length) return alert('Check inputs');

      status.innerText = 'Compressing...';
      const zip = new JSZip();
      zip.file('audio/'+audioFile.name, audioFile);

      const slidesMeta = [];
      for (let i=0;i<slides.length;i++){
        const b = await compressImage(slides[i]);
        const f = `slides/slide${i+1}.webp`;
        zip.file(f,b); slidesMeta.push({file:f,at:times[i]});
      }

      zip.file('manifest.json', JSON.stringify({title:'LiteClass Lesson',audio:'audio/'+audioFile.name,slides:slidesMeta},null,2));
      const blob = await zip.generateAsync({type:'blob'});
      saveAs(blob,'lesson.zip');
      status.innerText='Done! lesson.zip ready.';
    };
  </script>
